name: Deploy to GCP Zero-Trust

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # Go to your project directory on the VM
            # Make sure this matches where you cloned the repo!
            cd ~/atrocity.dev
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Rebuild the Docker containers in the background
            # This uses the cache so it will be fast if dependencies haven't changed
            docker compose up -d --build
            
            # Clean up old dangling images to save disk space on the free tier e2-micro
            docker image prune -f
